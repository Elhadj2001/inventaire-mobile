name: inventaire_mobile
description: "Application d'inventaire par scan QR — Institut Pasteur de Dakar"
publish_to: 'none'
version: 1.3.5+9

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  go_router: ^16.0.0
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  permission_handler: ^12.0.0
  image_picker: ^1.1.2
  uuid: ^4.5.1
  intl: ^0.20.0
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  connectivity_plus: ^6.1.0
  path_provider: ^2.1.4
  google_fonts: ^6.2.1
  sentry_flutter: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#052A62"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo_ipd_couleur.png
